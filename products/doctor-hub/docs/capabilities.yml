# =============================================================================
# capabilities.yml — MAPA DE CAPABILITIES do Doctor-Hub  (DDD2 · P-017)
#
# Fonte da verdade de "quem pode o quê". É, ao mesmo tempo: documentação humana,
# contexto p/ agents, (futuro) fonte dos testes de RBAC e do validador de AUDITORIA TEMPORAL.
#
# ─── MODELO DE ATUAÇÃO: UNIÃO DE PAPÉIS, POR FUNCIONALIDADE ───────────────────
# O usuário NÃO troca de persona. Logado, ele carrega TODOS os seus papéis; em cada tela,
# tem acesso a TODA feature que QUALQUER um dos seus papéis permita. Permissão efetiva =
# UNIÃO dos grants de todos os papéis do usuário, avaliada por AÇÃO/funcionalidade.
#   • Financeiro puro: vê o cadastro do médico (não edita) e vê+edita o faturamento.
#   • Demandas puro: edita o cadastro do médico; do faturamento vê só o MODELO (não o valor), não edita.
#   • Financeiro + Demandas: edita cadastro (via Demandas) E faturamento (via Financeiro).
# ⚠️ A relação com D-106 (isolamento de persona / seletor no avatar) precisa ser reconciliada —
#    ver PERGUNTA ABERTA no fim. Este modelo (união por feature) pode SUPERAR o switch de persona.
#
# ─── REGRA: APPEND-ONLY BITEMPORAL + CICLO DE VIDA (homolog × produção) ───────
# `status: em-homologacao` → a doc ainda está sendo MODELADA junto com o cliente; pode ser
#    ajustada livremente (ainda não foi a produção, não há log real a preservar).
# `status: produtivo` (a partir de `produtivoDesde`) → APPEND-ONLY: nunca edite/remova um grant;
#    para mudar, feche o antigo com `vigenteAte` e ADICIONE um novo `vigenteDesde`. A permissão
#    "em T" = grant vigente em T. Assim logs antigos seguem corretos e provamos que, após a mudança,
#    nenhuma ação ocorreu por persona não-autorizada naquela data.
# Datas ISO (YYYY-MM-DD). `vigenteAte: null`/ausente = vigente.
# =============================================================================

versao: 2
atualizadoEm: 2026-07-09

# --- Personas (papéis que logam) — discovery/02-roles.md -------------------------------------
personas:
  Admin:      "Administrador da plataforma (Portal Telemedicina) — vê e faz tudo."
  Demandas:   "Demandas Médicas — triagem/alocação; gere o CADASTRO do médico; TODOS os clientes."
  Financeiro: "Financeiro — gere o FATURAMENTO/contrato do médico; NÃO altera o cadastro."   # NOVO
  Operador:   "Operador Agendador — agenda dentro do escopo do seu cliente/complexo."
  Gestor:     "Gestor do cliente/unidade (visão do próprio HC)."

escopos:
  proprio-complexo: >
    Somente agendas DISPONIBILIZADAS da sua unidade OU do seu complexo público/privado
    (estadual, municipal, federal, programa de governo, SUS, ONG, FINEP).
  todos-os-clientes: "Sem restrição de cliente (visão global)."

# --- CAPABILITIES ---------------------------------------------------------------------------
# Schema: capability → `acoes` (granular por ação, com grants bitemporais) OU `grants` (simples,
# vale p/ a capability toda). Cada grant: { personas, [escopo], vigenteDesde, [vigenteAte] }.
capabilities:

  # ── Tela "Gestão de médicos" = duas áreas de feature: CADASTRO e FATURAMENTO ──────────────
  medico-cadastro:
    descricao: "Dados do médico (nome, CRM, CPF, contato, especialidades, status). Parte 'cadastro' da gestão de médicos."
    status: em-homologacao
    acoes:
      ver:
        grants:
          - { personas: [Admin, Demandas, Financeiro], vigenteDesde: 2026-07-09 }
      editar:
        grants:
          - { personas: [Admin, Demandas], vigenteDesde: 2026-07-09 }   # Financeiro NÃO edita cadastro

  medico-faturamento:
    descricao: "Faturamento do médico: MODELO de contrato (por hora × por consulta) + VALOR (quanto). Parte 'faturamento' da gestão de médicos."
    status: em-homologacao
    acoes:
      ver-modelo:                                    # o MODELO (por hora/consulta), SEM o valor
        grants:
          - { personas: [Admin, Demandas, Financeiro], vigenteDesde: 2026-07-09 }
      ver-valor:                                     # o VALOR (quanto) — Demandas NÃO vê
        grants:
          - { personas: [Admin, Financeiro], vigenteDesde: 2026-07-09 }
      editar:                                        # modelo + valor — só Financeiro/Admin
        grants:
          - { personas: [Admin, Financeiro], vigenteDesde: 2026-07-09 }
    # SUPERA a capability `faturamento` (Admin+Demandas) registrada em v1 hoje — era grossa demais.
    # Como nunca foi a produção (em-homologacao), refinamos direto em vez de vigenteAte+append.

  escala:
    descricao: "Criar, editar, arquivar e (sem agendamento) excluir escala do médico."
    status: em-homologacao
    grants:
      - { personas: [Demandas], vigenteDesde: 2026-07-09 }

  agendamento:
    descricao: "Assumir vaga disponibilizada e criar agendamento para um paciente."
    status: em-homologacao
    grants:
      - { personas: [Operador], escopo: proprio-complexo, vigenteDesde: 2026-07-09 }
      - { personas: [Demandas], escopo: todos-os-clientes, vigenteDesde: 2026-07-09 }

