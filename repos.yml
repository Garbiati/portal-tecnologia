# Manifest / catálogo de repositórios — Portal Telemedicina
# Fonte da verdade da linkagem entre o guarda-chuva (portal-tecnologia) e os repos da empresa.
# Polyrepo: cada repo é independente; aqui só REFERENCIAMOS (não submodules).
# `scripts/workspace.sh` (make workspace) clona/atualiza os que têm `url` confirmada em ./workspace/.
#
# Diretriz Suprema: NÃO inventar URL/dono/stack. O que não foi verificado leva `confirmar: true`.
# Campos: name, url, kind (governance|product|service|hub|lib|infra), owner, stack, status, docs (self|<path>), path, local.
# kind: infra = serviço de PLATAFORMA compartilhado por vários produtos (ex.: portal-identity = IdP), sem `product:`.
#
# Linkagem LÓGICA via manifest (P-002): polyrepo, cada repo é git independente — sem submodules.
# Lar FÍSICO (P-004): os repos próprios da empresa moram DENTRO do umbrella em `services/<repo>` (gitignored,
# git independente) — é o caso de doctor-hub-api/web e portal-identity. `path:` = esse caminho interno.
# `local:` = repo cujo lar canônico ainda é EXTERNO hoje (ex.: o hub teleconsulta vive em ~/ptm/teleconsulta
# com seus worktrees/helpers — NÃO re-clonar nem mover; migra para dentro com plano). Quando `local:` existe,
# `make workspace` faz um SYMLINK em ./workspace/<name> em vez de clonar (sem duplicar).

version: 1
org: PortalTelemedicina

repos:
  - name: portal-tecnologia
    url: git@github.com:PortalTelemedicina/portal-tecnologia.git   # P-005 (renomear no GitHub: portal-platform→portal-tecnologia; pendente)
    kind: governance
    owner: Alessandro
    stack: docs/markdown
    status: active
    docs: self
    path: .

  - name: portal-identity
    url: git@github.com:PortalTelemedicina/portal-identity.git    # confirmada por Alessandro
    kind: infra               # serviço de plataforma COMPARTILHADO (sem product:) — IdP da empresa
    owner: Alessandro
    stack: Keycloak · realm-as-code (JSON→Terraform) · GCP (futuro)
    status: build (P-003)
    docs: self                # README + docs/decisions/ no próprio repo
    path: services/portal-identity   # mora DENTRO do umbrella (gitignored), git independente — igual doctor-hub

  - name: teleconsulta
    url: git@github.com:PortalTelemedicina/teleconsulta.git       # verificado (remote local)
    kind: hub                 # monorepo-hub com ~30 services aninhados em services/
    owner: ~                  # confirmar
    stack: ~                  # confirmar (multi-stack)
    status: production
    docs: self                # docs/specs vivem no próprio repo
    path: workspace/teleconsulta
    local: ../ptm/teleconsulta   # hub vivo (worktrees + helpers tcc/tcwt) — symlink, não clonar/mover

  - name: doctor-hub-api
    url: git@github.com:PortalTelemedicina/doctor-hub-api.git     # verificado (remote configurado)
    kind: service
    product: doctor-hub
    owner: Alessandro
    stack: .NET 10 · EF Core+Dapper · Postgres
    status: build (Fase 6)
    docs: products/doctor-hub
    path: services/doctor-hub-api

  - name: doctor-hub-web
    url: git@github.com:PortalTelemedicina/doctor-hub-web.git     # verificado (remote configurado)
    kind: service
    product: doctor-hub
    owner: Alessandro
    stack: React · Vite · TS · Tailwind · PWA
    status: build (Fase 6)
    docs: products/doctor-hub
    path: services/doctor-hub-web

  # --- candidatos (existem como diretório em ~/ptm mas ainda NÃO são repos git / a confirmar) ---
  - name: dados
    url: ~
    confirmar: true
    kind: product
    owner: ~
    stack: ~
    status: candidate
    docs: ~
    path: workspace/dados
    local: ../ptm/dados          # diretório já existe em ~/ptm/dados

  - name: telediagnostico        # diretório local: ~/ptm/td
    url: ~
    confirmar: true
    kind: product
    owner: ~
    stack: ~
    status: candidate
    docs: ~
    path: workspace/td
    local: ../ptm/td             # diretório já existe em ~/ptm/td
